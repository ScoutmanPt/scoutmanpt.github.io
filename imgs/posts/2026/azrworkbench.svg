<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 420" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Azure Runbook Workbench Banner</title>
  <desc id="desc">Marketplace banner for Azure Runbook Workbench with Azure native styling, enterprise layout, and runbook development themes.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071423"/>
      <stop offset="0.52" stop-color="#0A2943"/>
      <stop offset="1" stop-color="#114C7A"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="0.45" stop-color="#38BDF8"/>
